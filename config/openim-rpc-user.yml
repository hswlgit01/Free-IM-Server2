rpc:
  # API or other RPCs can access this RPC through this IP; if left blank, the internal network IP is obtained by default
  # RPC 服务注册的 IP 地址。如果留空，默认使用内部网络 IP。
  registerIP:
  # Listening IP; 0.0.0.0 means both internal and external IPs are listened to, if blank, the internal network IP is automatically obtained by default
  # RPC 服务监听的 IP 地址。设置为 0.0.0.0 时，服务将监听所有网络接口（内部和外部 IP）。如果留空，默认使用内部网络 IP。
  listenIP: 0.0.0.0
  # autoSetPorts indicates whether to automatically set the ports
  # if you use in kubernetes, set it to false
  # 是否自动为 RPC 服务设置端口。
  autoSetPorts: true
  # List of ports that the RPC service listens on; configuring multiple ports will launch multiple instances. These must match the number of configured prometheus ports
  # It will only take effect when autoSetPorts is set to false.
  # 手动设置rpc服务端口, 该项仅在 autoSetPorts 设置为 false 时生效，即用户手动指定端口的情况下启用
  ports:

prometheus:
  # Whether to enable prometheus
  # 是否开启prometheus监控
  enable: true
  # Prometheus listening ports, must be consistent with the number of rpc.ports
  # It will only take effect when autoSetPorts is set to false.
  # Prometheus 监控服务监听的端口列表。这些端口必须与 rpc.ports 中的端口数量匹配，以确保监控设置正确。
  # 此字段只有在 autoSetPorts 设置为 false 时才生效。
  ports:

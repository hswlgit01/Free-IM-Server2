# URI for database connection, leave empty if using address and credential settings directly
# MongoDB 连接的 URI（统一资源标识符）。如果使用 URI 方式连接数据库，可以在这里填写完整的 MongoDB 连接字符串
# 为使用mongo事务，需开启单机mongo副本集模式  URI需要手动添加 增加参数  详细说明见文档
uri: mongodb://openIM:openIM123@localhost:37017/openim_v3?authSource=openim_v3&directConnection=true&replicaSet=rs0
# List of MongoDB server addresses
# MongoDB 服务器的地址列表。如果未使用 uri，则需要在这里指定 MongoDB 服务器的地址和端口
address: [ localhost:37017 ]
# Name of the database
# 数据库名称
database: openim_v3
# Username for database authentication
# 数据库认证的用户名
username: openIM
# Password for database authentication
# 数据库认证的密码
password: openIM123
# Authentication source for database authentication, if use root user, set it to admin
# 认证源数据库。如果使用的是 MongoDB 的超级用户（如 root），则需要设置为 admin。否则，设置为实际的数据库名称。
authSource: openim_v3
# Maximum number of connections in the connection pool
# 数据库连接池大小,100差不多可以
maxPoolSize: 100
# Maximum number of retry attempts for a failed database connection
# 数据库连接最大重试次数
maxRetry: 10

# TLS (传输层安全) 配置
tls:
  # 是否启用TLS
  # Enable or disable TLS
  enableTLS: false
  # CA证书文件路径
  # CA certificate file path
  caCrt: ""
  # 客户端证书文件路径
  # Client certificate file path
  clientCrt: ""
  # 客户端私钥文件路径
  # Client key file path
  clientKey: ""
  # 客户端私钥密码
  # Client key password
  clientKeyPwd: ""
  # 是否跳过TLS证书验证（生产环境不推荐）
  # Whether to skip TLS verification (not recommended for production)
  insecureSkipVerify: false

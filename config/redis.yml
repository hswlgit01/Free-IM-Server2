# 集群内redis的配置,redis会存储chat token和IM token 等等一些其它数据
# Redis 服务器的地址列表。可以指定一个或多个地址，以支持 Redis 的单机或集群模式。
address: [ localhost:16379 ]
# 用于 Redis 认证的用户名。如果 Redis 未启用用户名认证，可以留空。
username:
# redis用户的密码
password: openIM123
# 是否启用 Redis 集群模式。如果启用集群模式，Redis 会自动处理数据的分片和故障转移
clusterMode: false
db: 0
# 失败连接的最大重试次数
maxRetry: 10
# redis连接池大小
poolSize: 100

# TLS (传输层安全) 配置
tls:
  # 是否启用TLS
  # Enable or disable TLS
  enableTLS: false
  # CA证书文件路径
  # CA certificate file path
  caCrt: ""
  # 客户端证书文件路径
  # Client certificate file path
  clientCrt: ""
  # 客户端私钥文件路径
  # Client key file path
  clientKey: ""
  # 客户端私钥密码
  # Client key password
  clientKeyPwd: ""
  # 是否跳过TLS证书验证（生产环境不推荐）
  # Whether to skip TLS verification (not recommended for production)
  insecureSkipVerify: false

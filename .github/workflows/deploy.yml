# ============================================
# free-im-server CI/CD
# ============================================

name: Build & Deploy Server

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t freechat-server:latest .

      - name: Save image to file
        run: docker save freechat-server:latest | gzip > freechat-server.tar.gz

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "freechat-server.tar.gz"
          target: "/root/deploy/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            docker stop freechat-server 2>/dev/null || true
            docker rm   freechat-server 2>/dev/null || true
            docker rmi  freechat-server:latest 2>/dev/null || true
            docker load < /root/deploy/freechat-server.tar.gz
            rm -f /root/deploy/freechat-server.tar.gz
            docker run -d --name freechat-server \
              --network host --restart unless-stopped \
              -v /data/app/server/config:/im-server/config \
              -v /data/logs/server:/im-server/_output/logs \
              freechat-server:latest
            sleep 2
            docker ps --filter name=freechat-server
